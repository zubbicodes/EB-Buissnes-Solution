server {
    listen 80;
    server_name localhost;

    # The UI accepts files up to 25 MB. XLSX files are Base64 encoded in the
    # JSON request, and an allocation request can contain both a bank and an
    # invoice file, so allow enough room for the encoded payload plus JSON.
    client_max_body_size 75m;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://backend:8000;
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
