version: '3.8'

services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: receivables
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    ports:
      - "8000"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=receivables
      - JWT_SECRET=your-secret-key-change-in-production  # Change this to a real secret in production
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - CORS_ORIGINS=*

  frontend:
    build:
      context: ./frontend
      args:
        - REACT_APP_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
    restart: unless-stopped
    ports:
      - "80"
    depends_on:
      - backend

volumes:
  mongodb_data:
