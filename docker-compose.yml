version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: receivables-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: receivables

  backend:
    build:
      context: ./backend
    container_name: receivables-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=receivables
      - JWT_SECRET=your-secret-key-change-in-production  # Change this to a real secret in production
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    container_name: receivables-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongodb_data:
