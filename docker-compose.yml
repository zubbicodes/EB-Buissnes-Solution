version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: receivables-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: receivables
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
    container_name: receivables-backend
    restart: unless-stopped
    ports:
      - "8000"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=receivables
      - JWT_SECRET=your-secret-key-change-in-production  # Change this to a real secret in production
      - CORS_ORIGINS=*

  frontend:
    build:
      context: ./frontend
    container_name: receivables-frontend
    restart: unless-stopped
    ports:
      - "3000"
    depends_on:
      - backend

volumes:
  mongodb_data:
