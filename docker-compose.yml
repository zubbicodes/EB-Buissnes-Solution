services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: receivables
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    expose:
      - "8000"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=receivables
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-production}  # Set a real secret via env in production
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - APP_ENV=${APP_ENV:-development}
      - COOKIE_SECURE=${COOKIE_SECURE:-}
      - ALLOW_DEFAULT_ADMIN=${ALLOW_DEFAULT_ADMIN:-}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}

  frontend:
    build:
      context: ./frontend
      args:
        - REACT_APP_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
    restart: unless-stopped
    # No host port binding here: Coolify's proxy routes to this container
    # directly. For local development, docker-compose.override.yml maps
    # localhost:3000 -> 80 automatically.
    expose:
      - "80"
    depends_on:
      - backend

volumes:
  mongodb_data:
